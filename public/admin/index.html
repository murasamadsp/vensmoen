<!doctype html>
<html lang="nb">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <title>Rediger tekster · Vensmoen</title>
  </head>
  <body>
    <!-- Manuell init: vi laster skjemaet fra config.generated.json,
         som bygges fra nb.json med `npm run gen:cms`. -->
    <script>
      window.CMS_MANUAL_INIT = true;
    </script>
    <script src="https://unpkg.com/@sveltia/cms/dist/sveltia-cms.js"></script>
    <script>
      fetch('./config.generated.json', { cache: 'no-store' })
        .then((res) => {
          if (!res.ok) throw new Error(`config.generated.json: ${res.status}`);
          return res.json();
        })
        .then((config) => window.CMS.init({ config }))
        .catch((err) => {
          document.body.innerHTML =
            '<p style="font:16px system-ui;padding:2rem;color:#b00">' +
            'Kunne ikke laste konfigurasjonen. Kjør <code>npm run gen:cms</code>.<br>' +
            err.message +
            '</p>';
        });
    </script>
  </body>
</html>
