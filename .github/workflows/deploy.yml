name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Мінімальні права: build має лише читання за замовчуванням. pages/id-token
# видаються тільки deploy-job'і, не job'і з npm ci.
permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # щоб закомітити авто-переклади назад
      pages: read
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0 # потрібна історія для diff і пошуку останнього bot-коміту
      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .node-version
          cache: npm
      - name: Install (lockfile)
        run: npm ci
      # Синхронізує структуру масивів (blocks, contacts) у всіх мовах з nb.json.
      # Запускається перед авто-перекладом, щоб:
      #   - видалення блоку/контакту в nb → зайві елементи зрізаються з інших мов
      #   - додавання блоку/контакту в nb → нові елементи з'являються у всіх мовах
      #     (заповнені [TODO]), і auto-translate заміняє їх реальним перекладом.
      # Без цього кроку validate-i18n падає при будь-якій зміні довжини масиву.
      - name: Sync i18n structure with nb.json
        if: github.event_name == 'push'
        run: node scripts/sync-i18n.mjs

      # Auto-oversettelse: CMS-redaktøren endrer nb → de andre språkene fylles her.
      # Feil stopper deploy: nytt innhold skal ikke publiseres halvoversatt.
      - name: Auto-translate changed fields
        if: github.event_name == 'push' && github.event.before != '0000000000000000000000000000000000000000'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          GOOGLE_TRANSLATE_API_KEY: ${{ secrets.GOOGLE_TRANSLATE_API_KEY }}
          TRANSLATE_PROVIDER: ${{ vars.TRANSLATE_PROVIDER || 'anthropic' }}
          TRANSLATE_MODEL: ${{ vars.TRANSLATE_MODEL || 'claude-sonnet-4-6' }}
          TRANSLATE_FALLBACK_PROVIDER: ${{ vars.TRANSLATE_FALLBACK_PROVIDER }}
          TRANSLATE_FALLBACK_MODEL: ${{ vars.TRANSLATE_FALLBACK_MODEL }}
          TRANSLATE_TIMEOUT_MS: ${{ vars.TRANSLATE_TIMEOUT_MS || '60000' }}
          TRANSLATE_RETRIES: ${{ vars.TRANSLATE_RETRIES || '2' }}
          TRANSLATE_SOURCE_LOCALE: nb
          TRANSLATE_STRICT_SOURCE: 1
        run: |
          # Diff від останнього УСПІШНОГО перекладу (останній bot-коміт), а не
          # лише від попереднього push. Бот комітить тільки після успіху, тому
          # якщо прогін упав (кредити/API), база лишається і НАСТУПНИЙ прогін
          # забере всі накопичені зміни без постійного десинхрону.
          BASE=$(git log --author='vensmoen-translate-bot' -1 --format=%H || true)
          [ -z "$BASE" ] && BASE="${{ github.event.before }}"
          # Повністю пропускаємо, якщо мовні файли не змінювались
          # (наприклад, лише CSS/docs): API не запускається, витрат немає.
          if git diff --quiet "$BASE" HEAD -- src/i18n; then
            echo "i18n uendret siden $BASE – ingen oversettelse, hopper over."
            exit 0
          fi
          echo "Oversetter endringer siden $BASE"
          node scripts/validate-translate-env.mjs
          node scripts/auto-translate.mjs --base "$BASE"
      - name: Validate generated i18n before commit
        if: github.event_name == 'push'
        run: node scripts/validate-i18n.mjs
      # Записуємо переклади назад у repo, щоб CMS/repo бачили актуальні тексти.
      # Push через GITHUB_TOKEN НЕ запускає новий workflow → немає циклу перекладу.
      - name: Commit translations
        if: github.event_name == 'push'
        run: |
          if ! git diff --quiet -- src/i18n; then
            git config user.name "vensmoen-translate-bot"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add src/i18n
            git commit -m "i18n: auto-translate changed fields"
            push_failed=0
            for attempt in 1 2 3; do
              git push && break
              echo "Push feilet (forsøk $attempt), trekker og rebaserer..."
              git pull --rebase origin main || { echo "Rebase feilet, avbryter"; exit 1; }
              [ "$attempt" = "3" ] || continue
              push_failed=1
            done
            [ "$push_failed" = "0" ] || { echo "Kunne ikke pushe oversettelser"; exit 1; }
          else
            echo "Ingen oversettelser å committe."
          fi
      - name: Validate i18n + types
        run: npm run check
      - name: Build
        run: npm run build
      - name: Check internal links
        run: npm run check:links
      - name: Setup Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0
      - name: Upload artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
