name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Minste privilegium: build trenger bare lesetilgang. pages/id-token
# gis kun til deploy-jobben (ikke til jobben som kjører npm ci).
permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # for å committe auto-oversettelser tilbake
      pages: read
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0 # trenger forrige commit for diff (github.event.before)
      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 26
          cache: npm
      - name: Install (lockfile)
        run: npm ci
      # Синхронізує структуру масивів (blocks, contacts) у всіх мовах з nb.json.
      # Запускається перед авто-перекладом, щоб:
      #   - видалення блоку/контакту в nb → зайві елементи зрізаються з інших мов
      #   - додавання блоку/контакту в nb → нові елементи з'являються у всіх мовах
      #     (заповнені [TODO]), і auto-translate заміняє їх реальним перекладом.
      # Без цього кроку validate-i18n падає при будь-якій зміні довжини масиву.
      - name: Sync i18n structure with nb.json
        if: github.event_name == 'push'
        run: node scripts/sync-i18n.mjs

      # Auto-oversettelse: CMS-redaktøren endrer ETT språk → de andre fylles her.
      # best-effort (continue-on-error): hvis Claude-kreditt er tom, hoppes
      # oversettelsen over og siden deployes likevel (ingen blokkering av prod).
      - name: Auto-translate changed fields (best-effort)
        if: github.event_name == 'push' && github.event.before != '0000000000000000000000000000000000000000'
        continue-on-error: true
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          # Diff fra siste VELLYKKEDE oversettelse (siste bot-commit), ikke bare
          # forrige push. Boten committer kun ved suksess, så hvis en kjøring ble
          # hoppet over (tom kreditt / API-feil), står basen igjen og NESTE kjøring
          # tar med alle akkumulerte endringer – ingen permanent desync.
          BASE=$(git log --author='vensmoen-translate-bot' -1 --format=%H || true)
          [ -z "$BASE" ] && BASE="${{ github.event.before }}"
          # Hopp helt over hvis ingen språkfiler er endret (f.eks. kun CSS/docs):
          # da startes ikke Claude i det hele tatt – ingen kostnad.
          if git diff --quiet "$BASE" HEAD -- src/i18n; then
            echo "i18n uendret siden $BASE – ingen oversettelse, hopper over."
            exit 0
          fi
          echo "Oversetter endringer siden $BASE"
          node scripts/auto-translate.mjs --base "$BASE"
      # Skriv oversettelsene tilbake til repoet (så CMS/repo viser dem).
      # Push med GITHUB_TOKEN trigger IKKE ny workflow → ingen oversettelses-løkke.
      - name: Commit translations
        if: github.event_name == 'push'
        run: |
          if ! git diff --quiet -- src/i18n; then
            git config user.name "vensmoen-translate-bot"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add src/i18n
            git commit -m "i18n: auto-translate changed fields"
            for attempt in 1 2 3; do
              git push && break
              echo "Push feilet (forsøk $attempt), trekker og rebaserer..."
              git pull --rebase origin main || { echo "Rebase feilet, avbryter"; exit 1; }
            done
          else
            echo "Ingen oversettelser å committe."
          fi
      - name: Validate i18n + types
        run: npm run check
      - name: Build
        run: npm run build
      - name: Check internal links
        run: npm run check:links
      - name: Setup Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0
      - name: Upload artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
