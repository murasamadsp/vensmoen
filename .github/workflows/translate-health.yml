name: Translation health check

on:
  schedule:
    - cron: '17 6 * * 1'
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  translate-health:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .node-version
          cache: npm
      - name: Install (lockfile)
        run: npm ci
      - name: Check translation provider/model
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          GOOGLE_TRANSLATE_API_KEY: ${{ secrets.GOOGLE_TRANSLATE_API_KEY }}
          TRANSLATE_PROVIDER: ${{ vars.TRANSLATE_PROVIDER || 'anthropic' }}
          TRANSLATE_MODEL: ${{ vars.TRANSLATE_MODEL || 'claude-sonnet-4-6' }}
          TRANSLATE_FALLBACK_PROVIDER: ${{ vars.TRANSLATE_FALLBACK_PROVIDER }}
          TRANSLATE_FALLBACK_MODEL: ${{ vars.TRANSLATE_FALLBACK_MODEL }}
          TRANSLATE_TIMEOUT_MS: ${{ vars.TRANSLATE_TIMEOUT_MS || '60000' }}
          TRANSLATE_RETRIES: ${{ vars.TRANSLATE_RETRIES || '2' }}
          TRANSLATE_SOURCE_LOCALE: nb
          TRANSLATE_STRICT_SOURCE: 1
        run: |
          node scripts/validate-translate-env.mjs
          node scripts/auto-translate.mjs --health-check
